services:
  reasondb:
    build: .
    image: ajainvivek/reasondb:latest
    ports:
      - "4444:4444"
    volumes:
      - reasondb_data:/data
      - ./plugins:/plugins
    environment:
      REASONDB_HOST: "0.0.0.0"
      REASONDB_PORT: "4444"
      REASONDB_PATH: "/data/reasondb.redb"
      # LLM config is now stored in the database and managed via the API
      # (GET/PUT/PATCH /v1/config/llm). These env vars only seed the initial
      # config on first run. After that, use the API or CLI to update.
      REASONDB_LLM_PROVIDER: "${REASONDB_LLM_PROVIDER:-}"
      REASONDB_LLM_API_KEY: "${REASONDB_LLM_API_KEY:-}"
      REASONDB_MODEL: "${REASONDB_MODEL:-}"
      REASONDB_LLM_BASE_URL: "${REASONDB_LLM_BASE_URL:-}"
      REASONDB_RATE_LIMIT_RPM: "300"
      REASONDB_RATE_LIMIT_RPH: "5000"
      REASONDB_RATE_LIMIT_BURST: "30"
      REASONDB_WORKER_COUNT: "4"
      REASONDB_PLUGINS_DIR: "/plugins"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    develop:
      watch:
        - action: rebuild
          path: ./crates
        - action: rebuild
          path: ./Cargo.toml
        - action: rebuild
          path: ./Cargo.lock
        - action: sync
          path: ./plugins
          target: /plugins

volumes:
  reasondb_data:
